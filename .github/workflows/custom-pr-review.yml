# .github/workflows/custom-pr-review.yml
name: Custom PR Review (Multi-Model)

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }}...HEAD)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: AI Review
        id: review
        env:
          API_KEY: ${{ secrets.AI_API_KEY }}
          BASE_URL: ${{ secrets.AI_BASE_URL }}
          MODEL: ${{ secrets.AI_MODEL }}
        run: |
          python3 << 'PYEOF'
          import os
          import json
          import urllib.request
          import urllib.error

          API_KEY = os.getenv("API_KEY", "")
          BASE_URL = os.getenv("BASE_URL", "https://api.openai.com/v1")
          MODEL = os.getenv("MODEL", "meta/llama-3.1-8b-instruct")
          DIFF = os.environ.get("GITHUB_STEP_DIFF", "")

          if not API_KEY:
              print("No API key configured, skipping review")
              exit(0)

          if not DIFF or len(DIFF) < 10:
              print("No significant changes to review")
              exit(0)

          # Truncate diff if too long (keep last 50k chars)
          if len(DIFF) > 50000:
              DIFF = DIFF[-50000:]

          SYSTEM_PROMPT = """You are a senior code reviewer. Review the following git diff and provide:
          1. **Bugs** - potential bugs or errors
          2. **Security** - security issues
          3. **Improvements** - code quality suggestions
          4. **Positive** - what's done well

          Be concise. Use bullet points. Only mention real issues, not style preferences."""

          payload = {
              "model": MODEL,
              "messages": [
                  {"role": "system", "content": SYSTEM_PROMPT},
                  {"role": "user", "content": f"Review this PR diff:\n\n{DIFF}"}
              ],
              "temperature": 0.3,
              "max_tokens": 2000
          }

          url = f"{BASE_URL.rstrip('/')}/chat/completions"
          headers = {
              "Content-Type": "application/json",
              "Authorization": f"Bearer {API_KEY}"
          }

          req = urllib.request.Request(url,
              data=json.dumps(payload).encode(),
              headers=headers,
              method="POST"
          )

          try:
              with urllib.request.urlopen(req, timeout=60) as resp:
                  result = json.loads(resp.read().decode())
                  review = result["choices"][0]["message"]["content"]
                  print(review)
          except urllib.error.HTTPError as e:
              print(f"API error: {e.code} - {e.read().decode()}")
              exit(1)
          except Exception as e:
              print(f"Error: {e}")
              exit(1)
          PYEOF
        env:
          GITHUB_STEP_DIFF: ${{ steps.diff.outputs.diff }}

      - name: Post Review Comment
        if: steps.review.outputs.review != '' && steps.review.outputs.review != 'No significant changes to review'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const review = `${{ steps.review.outputs.review }}`;
            if (review && !review.includes('No significant changes')) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `## 🤖 AI Code Review\n\n${review}`
              });
            }
