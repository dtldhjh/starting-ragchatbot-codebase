# .github/workflows/custom-pr-review.yml
name: Custom PR Review (Multi-Model)

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin ${{ github.event.pull_request.base.ref }}
            DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }}...HEAD | head -5000)
          else
            DIFF=$(git diff HEAD~1 HEAD | head -5000)
          fi
          # Use base64 to avoid escaping issues
          echo "diff=$(echo "$DIFF" | base64 -w 0)" >> $GITHUB_OUTPUT

      - name: AI Review
        id: ai_review
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          DIFF_BASE64: ${{ steps.diff.outputs.diff }}
        run: bash .github/scripts/ai-review.sh

      - name: Post comment
        if: steps.ai_review.outputs.review == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.txt', 'utf8');
            if (review.trim()) {
              const issueNumber = context.issue.number;
              if (issueNumber) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `## 🤖 AI Code Review\n\n${review}`
                });
              }
            }
