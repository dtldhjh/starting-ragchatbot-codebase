# .github/workflows/custom-pr-review.yml
name: Custom PR Review (Multi-Model)

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin ${{ github.event.pull_request.base.ref }}
            DIFF=$(git diff origin/${{ github.event.pull_request.base.ref }}...HEAD | head -5000)
          else
            DIFF=$(git diff HEAD~1 HEAD | head -5000)
          fi
          # Use base64 to avoid escaping issues
          echo "diff=$(echo "$DIFF" | base64 -w 0)" >> $GITHUB_OUTPUT

      - name: AI Review
        id: ai_review
        run: |
          API_KEY="${{ secrets.AI_API_KEY }}"
          BASE_URL="${{ secrets.AI_BASE_URL || 'https://api.openai.com/v1' }}"
          MODEL="${{ secrets.AI_MODEL || 'meta/llama-3.1-8b-instruct' }}"
          DIFF=$(echo "${{ steps.diff.outputs.diff }}" | base64 -d)

          if [ -z "$API_KEY" ] || [ -z "$DIFF" ]; then
            echo "Skipping: no API key or empty diff"
            exit 0
          fi

          # Build JSON payload using python3 to avoid escaping issues
          PAYLOAD=$(python3 -c "
import json
payload = {
    'model': '$MODEL',
    'messages': [
        {'role': 'system', 'content': 'You are a senior code reviewer. Review the git diff for bugs, security issues, and improvements. Be concise.'},
        {'role': 'user', 'content': 'Review this diff:\\n\\n$DIFF'}
    ],
    'temperature': 0.3,
    'max_tokens': 2000
}
print(json.dumps(payload))
")

          RESPONSE=$(curl -s -X POST "$BASE_URL/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $API_KEY" \
            -d "$PAYLOAD")

          # Debug: print first 500 chars of response
          echo "Response preview: ${RESPONSE:0:500}"

          REVIEW=$(echo "$RESPONSE" | python3 -c "import sys,json; data=json.load(sys.stdin); print(data.get('choices',[{}])[0].get('message',{}).get('content','Error: no response'))")

          # Write to file for next step
          echo "$REVIEW" > /tmp/review.txt
          echo "review=true" >> $GITHUB_OUTPUT

      - name: Post comment
        if: steps.ai_review.outputs.review == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.txt', 'utf8');
            if (review.trim()) {
              const issueNumber = context.issue.number;
              if (issueNumber) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body: `## 🤖 AI Code Review\n\n${review}`
                });
              }
            }
